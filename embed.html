<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>圖庫</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; }
.shell {
  width: 100vw; height: 100vh;
  display: flex; align-items: center; justify-content: center;
  background: transparent; position: relative;
}
.carousel { position: relative; width: 100%; height: 100%; overflow: hidden; }
.track {
  display: flex; height: 100%;
  transition: transform 0.42s cubic-bezier(0.25,0.1,0.25,1);
}
.slide { min-width: 100%; height: 100%; }
.slide img { width: 100%; height: 100%; object-fit: contain; display: block; background: transparent; }

.nav {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 40px; height: 40px;
  background: rgba(247,131,172,0.15); border: 1px solid rgba(247,131,172,0.4);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  cursor: pointer; z-index: 10; transition: background 0.15s;
}
.nav:hover { background: rgba(247,131,172,0.3); }
.nav.prev { left: 14px; }
.nav.next { right: 14px; }
.nav svg { width: 18px; height: 18px; stroke: #e64980; fill: none; stroke-width: 2.5; }

.dots {
  position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 7px; z-index: 10;
}
.dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: rgba(247,131,172,0.3); border: none; padding: 0; cursor: pointer;
  transition: background 0.2s, transform 0.2s;
}
.dot.on { background: #e64980; transform: scale(1.3); }

.counter {
  position: absolute; top: 14px; right: 16px;
  font-family: system-ui, sans-serif; font-size: 12px;
  color: rgba(61,32,53,0.45); z-index: 10;
}
.state {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: rgba(61,32,53,0.4); font-family: system-ui, sans-serif; gap: 10px; font-size: 14px;
}
.spinner {
  width: 28px; height: 28px;
  border: 2px solid rgba(247,131,172,0.2); border-top-color: #f783ac;
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="shell" id="shell">
  <div class="state" id="state">
    <div class="spinner"></div>
    <span>載入中…</span>
  </div>
</div>
<script>
const GH_OWNER = 'jilyguna001';
const GH_REPO  = 'gallery';

function getParam(name) { return new URLSearchParams(location.search).get(name); }

async function loadAlbum(folder) {
  const url = `https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/main/albums/${encodeURIComponent(folder)}.json?t=${Date.now()}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`找不到相簿（HTTP ${r.status}）`);
  const data = await r.json();
  return data.urls || [];
}

function buildCarousel(images) {
  const shell = document.getElementById('shell');
  shell.innerHTML = '';

  const car   = document.createElement('div'); car.className = 'carousel';
  const track = document.createElement('div'); track.className = 'track';
  const dots  = document.createElement('div'); dots.className = 'dots';
  const counter = document.createElement('div'); counter.className = 'counter';

  let cur = 0, timer = null;

  images.forEach((url, i) => {
    const sl  = document.createElement('div'); sl.className = 'slide';
    const img = document.createElement('img');
    img.src = url; img.loading = i === 0 ? 'eager' : 'lazy';
    sl.appendChild(img); track.appendChild(sl);

    const d = document.createElement('button');
    d.className = 'dot' + (i === 0 ? ' on' : '');
    d.addEventListener('click', () => go(i));
    dots.appendChild(d);
  });

  function update(anim = true) {
    track.style.transition = anim ? 'transform 0.42s cubic-bezier(0.25,0.1,0.25,1)' : 'none';
    track.style.transform  = `translateX(-${cur * 100}%)`;
    dots.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('on', i === cur));
    counter.textContent = `${cur + 1} / ${images.length}`;
  }

  function go(idx) {
    cur = ((idx % images.length) + images.length) % images.length;
    update();
  }

  function resetTimer() { clearInterval(timer); timer = setInterval(() => go(cur + 1), 5000); }
  resetTimer();

  const prev = document.createElement('button'); prev.className = 'nav prev';
  prev.innerHTML = `<svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>`;
  prev.addEventListener('click', () => { go(cur - 1); resetTimer(); });

  const next = document.createElement('button'); next.className = 'nav next';
  next.innerHTML = `<svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>`;
  next.addEventListener('click', () => { go(cur + 1); resetTimer(); });

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  { go(cur - 1); resetTimer(); }
    if (e.key === 'ArrowRight') { go(cur + 1); resetTimer(); }
  });

  car.appendChild(track);
  car.appendChild(prev);
  car.appendChild(next);
  car.appendChild(dots);
  car.appendChild(counter);
  shell.appendChild(car);
  update(false);
}

async function init() {
  const folder = getParam('folder');
  if (!folder) {
    document.getElementById('state').innerHTML = '<span>缺少 folder 參數</span>';
    return;
  }
  try {
    const images = await loadAlbum(folder);
    if (!images.length) {
      document.getElementById('state').innerHTML = '<span>此相簿沒有圖片</span>';
      return;
    }
    buildCarousel(images);
  } catch(e) {
    document.getElementById('state').innerHTML = `<span>${e.message}</span>`;
  }
}

init();
</script>
</body>
</html>
